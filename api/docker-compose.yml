services:
  db:
    image: postgres:16-alpine
    container_name: trackbit_db
    environment:
      POSTGRES_USER: trackbit
      POSTGRES_PASSWORD: trackbit
      POSTGRES_DB: trackbit
    ports:
      - "5434:5432"
    volumes:
      - trackbit_pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trackbit"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  trackbit_pgdata:
